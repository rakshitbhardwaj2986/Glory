<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glory — Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--accent:#6c63ff;--accent2:#a78bfa;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;--r:12px}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px}
    nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,15,.9);backdrop-filter:blur(12px);z-index:10}
    .logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
    .nav-links{display:flex;gap:20px}.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}.nav-links a:hover,.nav-links a.active{color:var(--text)}
    .btn-sm{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent2)}
    .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#5a52e0}
    .container{max-width:1000px;margin:0 auto;padding:40px 24px 80px}
    .page-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:8px}
    .page-title{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
    .page-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
    /* Search bar */
    .search-bar{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
    .search-input{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
    .search-input:focus{border-color:var(--accent)}
    .search-input::placeholder{color:var(--muted);opacity:.7}
    .filter-select{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;cursor:pointer;appearance:none;min-width:130px}
    .filter-select option{background:#1a1a2e}
    /* Post form */
    .post-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:28px;display:none}
    .post-form h3{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;color:var(--accent2);margin-bottom:18px}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
    @media(max-width:600px){.fg{grid-template-columns:1fr}}
    .field label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
    .field input,.field select{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s;appearance:none}
    .field input:focus,.field select:focus{border-color:var(--accent)}.field select option{background:#1a1a2e}
    /* Job cards */
    .jobs-list{display:flex;flex-direction:column;gap:12px}
    .job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:border-color .2s}
    .job-card:hover{border-color:rgba(108,99,255,.3)}
    .job-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;margin-bottom:5px}
    .job-meta{display:flex;gap:12px;flex-wrap:wrap}
    .job-meta span{font-size:12.5px;color:var(--muted)}
    .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(108,99,255,.12);color:var(--accent2);border:1px solid rgba(108,99,255,.2)}
    .job-actions{display:flex;gap:8px;flex-shrink:0}
    .btn-match{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(108,99,255,.3);background:rgba(108,99,255,.1);color:var(--accent2);transition:all .2s;font-family:'Inter',sans-serif}
    .btn-match:hover{background:rgba(108,99,255,.2);border-color:var(--accent)}
    .btn-apply{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:#fff;transition:all .2s;font-family:'Inter',sans-serif}
    .btn-apply:hover{background:#5a52e0}
    .btn-apply.applied{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.25);cursor:default}
    .btn-apply:disabled{opacity:.5;cursor:not-allowed}
    .empty{text-align:center;padding:60px 20px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
    .toast{position:fixed;bottom:28px;right:28px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 18px;font-size:13.5px;display:none;z-index:100}
    .toast.success{border-color:rgba(34,197,94,.3);color:#86efac}.toast.error{border-color:rgba(239,68,68,.3);color:#fca5a5}
    footer{text-align:center;padding:20px;color:var(--muted);font-size:12px;border-top:1px solid var(--border)}
    footer a{color:var(--accent2);text-decoration:none}
  </style>
</head>
<body>
<nav>
  <a class="logo" href="/jobs-page">Glory</a>
  <div class="nav-links">
    <a href="/jobs-page" class="active">Jobs</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/match">Match</a>
    <a href="/docs">API Docs</a>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:13px;color:var(--muted)">Hi, <span id="nav-name" style="color:var(--accent2);font-weight:600">—</span></span>
    <button class="btn-sm btn-ghost" onclick="logout()">Sign Out</button>
  </div>
</nav>
<div class="container">
  <div class="page-eyebrow">Browse Opportunities</div>
  <div class="page-title">Find your next role.</div>
  <div class="page-sub" id="page-sub">Loading...</div>

  <!-- Search & Filter -->
  <div class="search-bar">
    <input class="search-input" id="search-input" placeholder="🔍  Search by title, company or location..." oninput="filterJobs()"/>
    <select class="filter-select" id="type-filter" onchange="filterJobs()">
      <option value="">All Types</option>
      <option value="Full-time">Full-time</option>
      <option value="Part-time">Part-time</option>
      <option value="Contract">Contract</option>
      <option value="Internship">Internship</option>
    </select>
  </div>

  <!-- Employer post form -->
  <div class="post-form" id="post-form">
    <h3>+ Post a New Job</h3>
    <div class="fg">
      <div class="field"><label>Company</label><input type="text" id="pf-company" placeholder="Acme Corp"/></div>
      <div class="field"><label>Job Title</label><input type="text" id="pf-title" placeholder="Backend Engineer"/></div>
      <div class="field"><label>Type</label>
        <select id="pf-type"><option>Full-time</option><option>Part-time</option><option>Contract</option><option>Internship</option></select>
      </div>
      <div class="field"><label>Location</label><input type="text" id="pf-location" placeholder="Dublin, Ireland"/></div>
    </div>
    <button class="btn-sm btn-primary" onclick="postJob()">Post Job</button>
  </div>

  <div id="jobs-container"><div class="empty">Loading jobs...</div></div>
</div>
<div class="toast" id="toast"></div>
<footer>Glory Job Platform · <a href="/docs">API Documentation</a></footer>
<script>
  const token=sessionStorage.getItem("token");
  const user=JSON.parse(sessionStorage.getItem("user")||"null");
  if(!token||!user)window.location.href="/";

  document.getElementById("nav-name").textContent=user.full_name.split(" ")[0];
  if(user.role==="employer"||user.role==="admin")document.getElementById("post-form").style.display="block";

  function ah(){return{"Authorization":"Bearer "+token,"Content-Type":"application/json"}}
  function toast(msg,type="success"){
    const t=document.getElementById("toast");t.textContent=msg;t.className="toast "+type;t.style.display="block";
    setTimeout(()=>t.style.display="none",3000);
  }
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

  let allJobs=[];

  async function loadJobs(){
    try{
      const res=await fetch("/jobs");
      allJobs=await res.json();
      renderJobs(allJobs);
    }catch{
      document.getElementById("jobs-container").innerHTML='<div class="empty" style="color:#fca5a5">Could not load jobs. Is the server running?</div>';
    }
  }

  function filterJobs(){
    const q=document.getElementById("search-input").value.toLowerCase();
    const type=document.getElementById("type-filter").value;
    const filtered=allJobs.filter(j=>{
      const matchQ=!q||j.job_title.toLowerCase().includes(q)||j.company.toLowerCase().includes(q)||j.location.toLowerCase().includes(q);
      const matchType=!type||j.type===type;
      return matchQ&&matchType;
    });
    renderJobs(filtered);
  }

  function renderJobs(jobs){
    document.getElementById("page-sub").textContent=jobs.length+" job"+(jobs.length!==1?"s":"")+" available";
    const c=document.getElementById("jobs-container");
    if(!jobs.length){c.innerHTML='<div class="empty">No jobs match your search.</div>';return}
    const isSeeker=user.role==="jobseeker";
    c.innerHTML='<div class="jobs-list">'+jobs.map(j=>`
      <div class="job-card">
        <div style="flex:1;min-width:0">
          <div class="job-title">${esc(j.job_title)}</div>
          <div class="job-meta">
            <span>🏢 ${esc(j.company)}</span>
            <span>📍 ${esc(j.location)}</span>
            <span><span class="badge">${esc(j.type)}</span></span>
          </div>
        </div>
        <div class="job-actions">
          ${isSeeker?`
            <button class="btn-match" onclick="goMatch('${esc(j.job_title)}','${esc(j.company)}')">Check Match</button>
            <button class="btn-apply" id="ap-${j.id}" onclick="applyJob(${j.id},this)">Apply</button>
          `:`<span style="font-size:12px;color:var(--muted)">Your posting</span>`}
        </div>
      </div>`).join("")+'</div>';
  }

  async function applyJob(id,btn){
    btn.disabled=true;btn.textContent="Applying...";
    try{
      const res=await fetch("/applications",{method:"POST",headers:ah(),body:JSON.stringify({job_id:id,status:"Applied"})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.detail||"Could not apply.");
      btn.textContent="✓ Applied";btn.className="btn-apply applied";
      toast("Application submitted!");
    }catch(e){toast(e.message,"error");btn.disabled=false;btn.textContent="Apply";}
  }

  function goMatch(title,company){
    sessionStorage.setItem("matchJob",title+" at "+company);
    window.location.href="/match";
  }

  async function postJob(){
    const company=document.getElementById("pf-company").value.trim();
    const job_title=document.getElementById("pf-title").value.trim();
    const type=document.getElementById("pf-type").value;
    const location=document.getElementById("pf-location").value.trim();
    if(!company||!job_title||!location)return toast("Fill in all fields.","error");
    try{
      const res=await fetch("/jobs",{method:"POST",headers:ah(),body:JSON.stringify({company,job_title,type,location})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.detail||"Could not post job.");
      toast("Job posted!");
      ["pf-company","pf-title","pf-location"].forEach(id=>document.getElementById(id).value="");
      loadJobs();
    }catch(e){toast(e.message,"error");}
  }

  function logout(){sessionStorage.clear();window.location.href="/"}
  loadJobs();
</script>
</body>
</html>
